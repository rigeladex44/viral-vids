<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Meta Tags Branding HUB21 -->
    <title>HUB21 - Trending Video Center</title>
    <meta name="description" content="Watch viral trending videos on HUB21.">
    <meta property="og:title" content="HUB21 | Official Video Player">
    <meta property="og:url" content="https://hub21.online">
    <meta property="og:image" content="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1000">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; background: #000; background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1566417713940-0e81f05014b4?q=80&w=1000'); background-size: cover; background-position: center; color: #fff; font-family: 'Inter', sans-serif; }
        
        /* Header */
        header { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); box-sizing: border-box; }
        .logo { font-weight: 800; font-size: 1.3rem; text-transform: uppercase; }
        .logo span { background: #ff0000; padding: 2px 8px; border-radius: 4px; margin-right: 4px; }

        /* Content */
        .container { width: 90%; max-width: 420px; text-align: center; margin: auto; z-index: 10; }
        .card { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8); cursor: pointer; }
        .thumb { position: relative; aspect-ratio: 16/9; background: url('https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1000') center/cover; display: flex; justify-content: center; align-items: center; }
        .play-btn { width: 70px; height: 70px; background: linear-gradient(135deg, #ff416c, #ff4b2b); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 30px rgba(255, 65, 108, 0.6); animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .details { padding: 20px; text-align: left; }
        .title { font-size: 1.1rem; font-weight: 800; margin-bottom: 5px; }
        .meta { font-size: 0.8rem; color: #3897f0; font-weight: 700; }
        
        .btn { width: 100%; margin-top: 20px; padding: 18px; background: linear-gradient(135deg, #ff416c, #ff4b2b); color: #fff; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3); }
        
        .footer { padding-bottom: 20px; font-size: 0.7rem; color: rgba(255,255,255,0.4); text-align: center; }
    </style>
</head>
<body>
    <div id="wrapper">
        <header>
            <div class="logo"><span>HUB</span>21</div>
            <div style="opacity: 0.6;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </div>
        </header>
        
        <div class="container">
            <div class="card" onclick="goToLink()">
                <div class="thumb">
                    <div class="play-btn">
                        <svg width="35" height="35" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
                <div class="details">
                    <div class="title" id="t-title">Trending: Nonton Video Viral Full Version di HUB21</div>
                    <div class="meta">✓ Terverifikasi • 3.4M Penonton</div>
                </div>
            </div>
            <button class="btn" onclick="goToLink()" id="t-btn">NONTON SEKARANG</button>
        </div>
        
        <div class="footer">© 2026 HUB21. Seluruh konten dilindungi SSL Secure.</div>
    </div>

    <script>
        const link = "https://www.profitablecpmratenetwork.com/pkp342mg?key=0bf25c7a02603fde63db389f32858bae";
        function goToLink() { window.open(link, '_blank'); }

        async function detect() {
            try {
                const r = await fetch('https://ipapi.co/json/');
                const d = await r.json();
                if (d.country_code !== 'ID') {
                    document.getElementById('t-title').innerText = "Trending: Watch Full Viral Video on HUB21";
                    document.getElementById('t-btn').innerText = "WATCH NOW FULL";
                }
            } catch (e) {}
        }
        detect();
    </script>
</body>
</html>
