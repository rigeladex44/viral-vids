<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Player - Viral Content</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Reset & Force Full Screen */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            background-color: #000 !important;
        }

        #lp-main-wrapper {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            z-index: 999999 !important;
            background: #000;
            /* Background Halaman - Foto Lifestyle Mewah */
            background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1566417713940-0e81f05014b4?q=80&w=1000&auto=format&fit=crop') !important;
            background-size: cover !important;
            background-position: center !important;
            color: #ffffff !important;
            font-family: 'Inter', sans-serif !important;
        }

        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Video Card Design */
        .video-card {
            background: rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            border-radius: 28px !important;
            overflow: hidden !important;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8) !important;
            cursor: pointer !important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
        }

        .video-card:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.3) !important;
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* FOTO THUMBNAIL - Foto Sexy/Model Menarik */
        .thumbnail-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-image: url('https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center top;
            opacity: 0.85;
        }

        .play-button {
            position: relative;
            z-index: 10;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%) !important;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(255, 75, 43, 0.8);
            animation: pulse 2s infinite;
        }

        .play-button svg {
            fill: white;
            width: 35px;
            height: 35px;
            margin-left: 5px;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 75, 43, 0.8); }
            70% { transform: scale(1.15); box-shadow: 0 0 0 25px rgba(255, 75, 43, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 75, 43, 0); }
        }

        .live-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #ff0000;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 20;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .info-section {
            padding: 20px;
            text-align: left;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 12px;
            color: #fff;
        }

        .meta-data {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: #ccc;
        }

        .verified {
            color: #3897f0;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 700;
        }

        .cta-button {
            width: 100%;
            margin-top: 25px;
            padding: 18px;
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%) !important;
            color: white !important;
            border: none !important;
            border-radius: 16px !important;
            font-size: 1.1rem !important;
            font-weight: 900 !important;
            text-transform: uppercase !important;
            cursor: pointer !important;
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.4) !important;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <div id="lp-main-wrapper">
        <div class="container">
            <!-- Card Utama -->
            <div class="video-card" id="triggerArea">
                <div class="thumbnail-container">
                    <div class="live-badge">
                        <div class="live-dot"></div> <span id="text-live">LIVE</span>
                    </div>
                    <div class="thumbnail-img"></div>
                    <div class="play-button">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
                
                <div class="info-section">
                    <div class="video-title" id="text-title">Viral: Video Terbaru Yang Lagi Rame! (Klik Nonton Full)</div>
                    <div class="meta-data">
                        <span class="verified">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7L6.3 12.9l1.4-1.4 2.4 2.4 5.6-5.6 1.4 1.4-7 7z"/></svg>
                            <span id="text-verified">Terverifikasi</span>
                        </span>
                        <span>•</span>
                        <span id="text-views">2.1M Penonton</span>
                    </div>
                </div>
            </div>

            <!-- Tombol -->
            <button class="cta-button" id="btnAction">NONTON VIDEO FULL</button>

            <p class="footer" id="text-footer">Konten ini mungkin mengandung promosi. Klik akan membuka pemutar video di tab baru.</p>
        </div>
    </div>

    <script>
        const adsterraLink = "https://www.profitablecpmratenetwork.com/pkp342mg?key=0bf25c7a02603fde63db389f32858bae";

        const translations = {
            "ID": { live: "LANGSUNG", title: "Viral: Video Terbaru Yang Lagi Rame! (Klik Nonton Full)", verified: "Terverifikasi", views: "2.1M Penonton", button: "NONTON VIDEO FULL", footer: "Video akan dibuka di tab baru. Pastikan koneksi stabil." },
            "US": { live: "LIVE", title: "Viral: New Trending Video! (Click to Watch Full)", verified: "Verified", views: "2.1M Views", button: "WATCH FULL VIDEO", footer: "Video will open in a new tab. Fast connection recommended." },
            "ES": { live: "EN VIVO", title: "Viral: ¡Nuevo Video Tendencia! (Clic Para Ver)", verified: "Verificado", views: "2.1M Vistas", button: "VER VIDEO COMPLETO", footer: "El video se abrirá en una pestaña nueva." },
            "BR": { live: "AO VIVO", title: "Viral: Novo Vídeo Bombando! (Clique Para Ver)", verified: "Verificado", views: "2.1M Visualizações", button: "ASSISTIR AGORA", footer: "O vídeo abrirá em uma nova aba." }
        };

        async function initPage() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                const cc = data.country_code;
                const lang = translations[cc] || translations["US"];

                document.getElementById('text-live').innerText = lang.live;
                document.getElementById('text-title').innerText = lang.title;
                document.getElementById('text-verified').innerText = lang.verified;
                document.getElementById('text-views').innerText = lang.views;
                document.getElementById('btnAction').innerText = lang.button;
                document.getElementById('text-footer').innerText = lang.footer;
            } catch (e) {
                console.log("Using default language");
            }
        }

        function doRedirect() {
            window.open(adsterraLink, '_blank');
        }

        document.getElementById('triggerArea').addEventListener('click', doRedirect);
        document.getElementById('btnAction').addEventListener('click', doRedirect);
        initPage();
    </script>
</body>
</html>
